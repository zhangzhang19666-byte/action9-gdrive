name: Action 9 — 每日定时抓取 + 上传 GDrive (安全限流版)

# 所需 secrets：
#   G_CLIENT_ID / G_CLIENT_SECRET / G_REFRESH_TOKEN / GDRIVE_ROOT_FOLDER
#   DATA_REPO / DATA_REPO_TOKEN  (cookie & works list 私密库)
#   GH_PAT                       (触发续跑用)

on:
  workflow_dispatch:
    inputs:
      workers:
        description: '并行线程数'
        default: '8'
      time_limit:
        description: '限时运行(秒)'
        default: '18000'
  schedule:
    # 北京时间 02:00 (UTC 18:00) 和 14:00 (UTC 06:00)，间隔 12 小时
    - cron: '0 6,18 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout Data
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DATA_REPO }}
          token:      ${{ secrets.DATA_REPO_TOKEN }}
          path:       _data

      - name: Restore Cookies and Works List
        run: |
          mkdir -p output input/cookies
          cp _data/input/cookies/douyin_cookie_1.json input/cookies/douyin_cookie_1.json
          echo "✅ Cookie 已恢复"
          if [ -f "_data/input/douyin_works.json" ]; then
            cp _data/input/douyin_works.json input/douyin_works.json
            echo "✅ douyin_works.json 已恢复"
          else
            echo "⚠️  未找到 douyin_works.json"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Dependencies
        run: |
          pip install requests pyyaml
          sudo apt-get install -y aria2

      - name: Download DB from GDrive
        env:
          G_CLIENT_ID:        ${{ secrets.G_CLIENT_ID }}
          G_CLIENT_SECRET:    ${{ secrets.G_CLIENT_SECRET }}
          G_REFRESH_TOKEN:    ${{ secrets.G_REFRESH_TOKEN }}
          GDRIVE_ROOT_FOLDER: ${{ secrets.GDRIVE_ROOT_FOLDER }}
        run: |
          python gdrive_db_sync.py --action download --db_path output/global_tasks.db || true
          # 首次迁移：GDrive 无 DB 时回退到 _data 旧版
          if [ ! -f "output/global_tasks.db" ] && [ -f "_data/output/global_tasks.db" ]; then
            cp _data/output/global_tasks.db output/global_tasks.db
            echo "ℹ️  GDrive 无 DB，使用 _data 备份版（迁移过渡）"
          fi
          [ -f "output/global_tasks.db" ] && echo "✅ DB 就绪 ($(du -sh output/global_tasks.db | cut -f1))" || echo "ℹ️  首次运行，无 DB"

      - name: Run Action 9
        env:
          G_CLIENT_ID:        ${{ secrets.G_CLIENT_ID }}
          G_CLIENT_SECRET:    ${{ secrets.G_CLIENT_SECRET }}
          G_REFRESH_TOKEN:    ${{ secrets.G_REFRESH_TOKEN }}
          GDRIVE_ROOT_FOLDER: ${{ secrets.GDRIVE_ROOT_FOLDER }}
        run: |
          python action9_loop.py \
            --workers     "${{ github.event.inputs.workers || '8' }}" \
            --time_limit  "${{ github.event.inputs.time_limit || '18000' }}" \
            --g_client_id     "$G_CLIENT_ID" \
            --g_client_secret "$G_CLIENT_SECRET" \
            --g_refresh_token "$G_REFRESH_TOKEN"

      - name: Upload DB to GDrive
        if: always()
        env:
          G_CLIENT_ID:        ${{ secrets.G_CLIENT_ID }}
          G_CLIENT_SECRET:    ${{ secrets.G_CLIENT_SECRET }}
          G_REFRESH_TOKEN:    ${{ secrets.G_REFRESH_TOKEN }}
          GDRIVE_ROOT_FOLDER: ${{ secrets.GDRIVE_ROOT_FOLDER }}
        run: |
          if [ -f "output/global_tasks.db" ]; then
            python gdrive_db_sync.py --action upload --db_path output/global_tasks.db
          else
            echo "ℹ️  无 DB 文件，跳过上传"
          fi

      - name: Trigger Next Run (if continuation needed)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f "output/.continuation_needed" ]; then
            echo "📌 检测到续跑标志，5秒后触发下一次..."
            sleep 5
            gh workflow run action9.yml \
              --repo "${{ github.repository }}" \
              --field workers="${{ github.event.inputs.workers || '8' }}" \
              --field time_limit="${{ github.event.inputs.time_limit || '18000' }}"
            echo "✅ 下一次运行已触发"
          else
            echo "✅ 无续跑需求，任务完成"
          fi
