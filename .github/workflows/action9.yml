name: Action 9 — 每日定时抓取 + 上传 GDrive (安全限流版)

# 环境变量配置说明：
#   G_CLIENT_ID         Google OAuth Client ID
#   G_CLIENT_SECRET     Google OAuth Client Secret
#   G_REFRESH_TOKEN     Google OAuth Refresh Token
#   GDRIVE_ROOT_FOLDER  GDrive 根文件夹 ID
#   DATA_REPO           数据仓库 (owner/repo)
#   DATA_REPO_TOKEN     私有仓库访问令牌 (PAT)

on:
  workflow_dispatch:
    inputs:
      workers:
        description: '并行线程数'
        default: '8'
      time_limit:
        description: '限时运行(秒)'
        default: '18000'
  schedule:
    # 每天北京时间凌晨 02:00 启动 (UTC 18:00)
    # 运行 5 小时后停止，确保每天只有一波高流量，降低封号风险
    - cron: '0 18 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout Data
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DATA_REPO }}
          token:      ${{ secrets.DATA_REPO_TOKEN }}
          path:       _data

      - name: Restore DB
        run: |
          mkdir -p output input/cookies
          [ -f "_data/output/global_tasks.db" ] && cp _data/output/global_tasks.db output/global_tasks.db
          cp _data/input/cookies/douyin_cookie_1.json input/cookies/douyin_cookie_1.json
          [ -f "_data/input/douyin_works.json" ] && cp _data/input/douyin_works.json input/douyin_works.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install requests pyyaml
          sudo apt-get install -y aria2

      - name: Run Action 9
        env:
          G_CLIENT_ID:          ${{ secrets.G_CLIENT_ID }}
          G_CLIENT_SECRET:      ${{ secrets.G_CLIENT_SECRET }}
          G_REFRESH_TOKEN:      ${{ secrets.G_REFRESH_TOKEN }}
          GDRIVE_ROOT_FOLDER:   ${{ secrets.GDRIVE_ROOT_FOLDER }}
        run: |
          # 运行 18000 秒 (5小时)
          python action9_loop.py \
            --workers     "${{ github.event.inputs.workers || '8' }}" \
            --time_limit  "${{ github.event.inputs.time_limit || '18000' }}" \
            --g_client_id     "$G_CLIENT_ID" \
            --g_client_secret "$G_CLIENT_SECRET" \
            --g_refresh_token "$G_REFRESH_TOKEN"

      - name: Sync DB Back
        if: always()
        run: |
          mkdir -p _data/output
          if [ -f "output/global_tasks.db" ]; then
            cp output/global_tasks.db _data/output/global_tasks.db
            cd _data
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add output/global_tasks.db
            git diff --cached --quiet || git commit -m "chore: daily db update [skip ci]"
            git push origin HEAD
          fi

      - name: Finish
        run: echo "本轮 5 小时运行结束。已停止自动触发，等待明天的定时任务。"
